training:
  max_seq_length: 1024
  num_epochs: 2
  learning_rate: 0.0002
  batch_size: 2
  gradient_accumulation_steps: 4
  warmup_steps: 5
  max_steps: 0
  save_steps: 30
  eval_steps: 0.1
  weight_decay: 0.001
  random_seed: 3407
  packing: false
  train_on_completions: true
  gradient_checkpointing: unsloth
  optim: adamw_8bit
  lr_scheduler_type: cosine
lora:
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - all-linear
  use_rslora: false
  use_loftq: false
